<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="520" fill="#0f1830" rx="14"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#ffffff">🚗 Steering-Wheel Chassis Kinematics</text>
  <text x="40" y="74" font-size="14" fill="#8ba1c4">Each module steers (δ) and drives (v); the base pose feeds the whole-body Jacobian</text>

  <!-- chassis body (top view) -->
  <g transform="translate(450,290)">
    <rect x="-180" y="-110" width="360" height="220" rx="20" fill="#1c2b4d" stroke="#33476e" stroke-width="2"/>
    <text x="0" y="-70" text-anchor="middle" fill="#9fb3d1" font-size="14">base frame {B}</text>

    <!-- body frame axes -->
    <line x1="0" y1="0" x2="80" y2="0" stroke="#FFB000" stroke-width="3" marker-end="url(#a1)"/>
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#36CFC9" stroke-width="3" marker-end="url(#a2)"/>
    <text x="86" y="6" fill="#FFB000" font-size="14">x_B</text>
    <text x="6" y="-86" fill="#36CFC9" font-size="14">y_B</text>
    <circle cx="0" cy="0" r="5" fill="#ffffff"/>

    <!-- four steerable modules -->
    <!-- helper: each = hub + wheel rect rotated to show steer angle -->
    <g stroke="#00B8D9" stroke-width="2.5" fill="#0f1830">
      <!-- front-left -->
      <g transform="translate(-140,-80)">
        <circle r="16" fill="#16233f" stroke="#8A63D2" stroke-width="2.5"/>
        <g transform="rotate(-25)"><rect x="-7" y="-22" width="14" height="44" rx="5" fill="#1c2b4d" stroke="#00B8D9"/></g>
        <line x1="0" y1="0" x2="28" y2="-13" stroke="#36CFC9" stroke-width="2" stroke-dasharray="3 3"/>
      </g>
      <!-- front-right -->
      <g transform="translate(140,-80)">
        <circle r="16" fill="#16233f" stroke="#8A63D2" stroke-width="2.5"/>
        <g transform="rotate(20)"><rect x="-7" y="-22" width="14" height="44" rx="5" fill="#1c2b4d" stroke="#00B8D9"/></g>
        <line x1="0" y1="0" x2="26" y2="9" stroke="#36CFC9" stroke-width="2" stroke-dasharray="3 3"/>
      </g>
      <!-- rear-left -->
      <g transform="translate(-140,80)">
        <circle r="16" fill="#16233f" stroke="#8A63D2" stroke-width="2.5"/>
        <g transform="rotate(15)"><rect x="-7" y="-22" width="14" height="44" rx="5" fill="#1c2b4d" stroke="#00B8D9"/></g>
      </g>
      <!-- rear-right -->
      <g transform="translate(140,80)">
        <circle r="16" fill="#16233f" stroke="#8A63D2" stroke-width="2.5"/>
        <g transform="rotate(-12)"><rect x="-7" y="-22" width="14" height="44" rx="5" fill="#1c2b4d" stroke="#00B8D9"/></g>
      </g>
    </g>

    <!-- steer-angle annotation on front-left -->
    <text x="-150" y="-110" fill="#36CFC9" font-size="13">δ₁</text>
  </g>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#FFB000"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#36CFC9"/></marker>
  </defs>

  <!-- world frame -->
  <g transform="translate(90,440)">
    <line x1="0" y1="0" x2="55" y2="0" stroke="#FFB000" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-55" stroke="#36CFC9" stroke-width="3"/>
    <text x="60" y="4" fill="#FFB000" font-size="13">x_W</text>
    <text x="4" y="-60" fill="#36CFC9" font-size="13">y_W</text>
    <text x="-6" y="22" fill="#9fb3d1" font-size="13">world {W}</text>
  </g>

  <!-- equation panel -->
  <g transform="translate(560,120)">
    <rect x="0" y="0" width="300" height="120" rx="10" fill="#16233f" stroke="#2a3b5e"/>
    <text x="20" y="34" fill="#cfe0f5" font-size="14" font-style="italic">base config:</text>
    <text x="20" y="62" fill="#36CFC9" font-size="15" font-family="monospace">q_base = [x, y, θ, δ₁..δ₄]</text>
    <text x="20" y="92" fill="#cfe0f5" font-size="14" font-style="italic">enters whole-body J(q)</text>
    <text x="20" y="112" fill="#8ba1c4" font-size="12">subject to steering + slip constraints</text>
  </g>
</svg>
