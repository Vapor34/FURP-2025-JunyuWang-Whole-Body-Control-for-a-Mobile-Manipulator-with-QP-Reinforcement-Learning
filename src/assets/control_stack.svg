<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="560" fill="#0f1830" rx="14"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#ffffff">🧠 Whole-Body Control Stack</text>
  <text x="40" y="74" font-size="14" fill="#8ba1c4">From task goal to coordinated base + dual-arm commands</text>

  <defs>
    <marker id="d" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0 0 L8 3.5 L0 7 Z" fill="#36CFC9"/></marker>
  </defs>

  <!-- layers -->
  <g font-size="16" font-weight="600">
    <!-- task -->
    <rect x="210" y="100" width="300" height="56" rx="12" fill="#16233f" stroke="#FFB000" stroke-width="2.5"/>
    <text x="360" y="126" text-anchor="middle" fill="#FFB000">🎯 Task / Reference</text>
    <text x="360" y="146" text-anchor="middle" fill="#9fb3d1" font-size="12">desired end-effector motion(s)</text>

    <!-- RL -->
    <rect x="210" y="186" width="300" height="56" rx="12" fill="#16233f" stroke="#8A63D2" stroke-width="2.5"/>
    <text x="360" y="212" text-anchor="middle" fill="#b79bff">🧠 RL Layer (optional)</text>
    <text x="360" y="232" text-anchor="middle" fill="#9fb3d1" font-size="12">residual / high-level decisions</text>

    <!-- QP -->
    <rect x="180" y="272" width="360" height="70" rx="12" fill="#16233f" stroke="#36CFC9" stroke-width="3"/>
    <text x="360" y="300" text-anchor="middle" fill="#36CFC9">⚙️ QP Whole-Body Controller</text>
    <text x="360" y="322" text-anchor="middle" fill="#9fb3d1" font-size="12">min ‖Jq̇ − ẋ‖² s.t. joint / base / collision limits</text>

    <!-- allocation -->
    <rect x="210" y="372" width="300" height="56" rx="12" fill="#16233f" stroke="#00B8D9" stroke-width="2.5"/>
    <text x="360" y="398" text-anchor="middle" fill="#00d6f5">🦾 Joint / Wheel Commands</text>
    <text x="360" y="418" text-anchor="middle" fill="#9fb3d1" font-size="12">base steer+drive · left arm · right arm</text>

    <!-- robot -->
    <rect x="210" y="458" width="300" height="56" rx="12" fill="#1c2b4d" stroke="#33476e" stroke-width="2.5"/>
    <text x="360" y="484" text-anchor="middle" fill="#ffffff">🤖 Robot + State Estimation</text>
    <text x="360" y="504" text-anchor="middle" fill="#9fb3d1" font-size="12">odometry · joint encoders · IMU</text>
  </g>

  <!-- down arrows -->
  <g stroke="#36CFC9" stroke-width="2.5" marker-end="url(#d)">
    <line x1="360" y1="156" x2="360" y2="184"/>
    <line x1="360" y1="242" x2="360" y2="270"/>
    <line x1="360" y1="342" x2="360" y2="370"/>
    <line x1="360" y1="428" x2="360" y2="456"/>
  </g>

  <!-- feedback loop -->
  <path d="M210 486 L70 486 L70 300 L178 300" fill="none" stroke="#FFB000" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#d)"/>
  <text x="80" y="396" fill="#FFB000" font-size="12" transform="rotate(-90 80 396)">state feedback</text>

  <!-- reward arrow to RL -->
  <path d="M510 486 L650 486 L650 214 L512 214" fill="none" stroke="#8A63D2" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#d)"/>
  <text x="636" y="360" fill="#b79bff" font-size="12" transform="rotate(-90 636 360)">reward / feedback</text>
</svg>
