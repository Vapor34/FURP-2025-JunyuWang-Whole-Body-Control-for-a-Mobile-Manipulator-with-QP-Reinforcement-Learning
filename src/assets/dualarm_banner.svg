<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#16233f"/>
      <stop offset="1" stop-color="#1f2d4d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B8D9"/>
      <stop offset="0.5" stop-color="#36CFC9"/>
      <stop offset="1" stop-color="#8A63D2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00B8D9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00B8D9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>
  <rect y="294" width="1200" height="6" fill="url(#accent)"/>
  <circle cx="950" cy="150" r="220" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#2a3b5e" stroke-width="1" opacity="0.4">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- ===== Robot illustration ===== -->
  <g transform="translate(840,40)">
    <!-- steering-wheel chassis -->
    <rect x="40" y="170" width="220" height="40" rx="10" fill="#33476e"/>
    <!-- steerable wheels -->
    <g fill="#1b2840" stroke="#00B8D9" stroke-width="3">
      <ellipse cx="75" cy="225" rx="20" ry="14"/>
      <ellipse cx="225" cy="225" rx="20" ry="14"/>
    </g>
    <line x1="75" y1="211" x2="75" y2="205" stroke="#36CFC9" stroke-width="3"/>
    <line x1="225" y1="211" x2="225" y2="205" stroke="#36CFC9" stroke-width="3"/>
    <!-- torso -->
    <rect x="130" y="90" width="40" height="90" rx="8" fill="#33476e"/>
    <!-- shoulders -->
    <circle cx="150" cy="95" r="10" fill="#8A63D2"/>
    <!-- left arm -->
    <g stroke="#36CFC9" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M150 100 L95 70"/>
      <path d="M95 70 L60 110"/>
    </g>
    <circle cx="95" cy="70" r="7" fill="#00B8D9"/>
    <circle cx="60" cy="110" r="8" fill="#00B8D9"/>
    <!-- right arm -->
    <g stroke="#8A63D2" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M150 100 L205 70"/>
      <path d="M205 70 L240 110"/>
    </g>
    <circle cx="205" cy="70" r="7" fill="#8A63D2"/>
    <circle cx="240" cy="110" r="8" fill="#8A63D2"/>
    <!-- carried object between grippers -->
    <rect x="120" y="125" width="60" height="22" rx="5" fill="#FFB000" opacity="0.9"/>
    <g stroke="#FFB000" stroke-width="3" stroke-dasharray="4 4" fill="none" opacity="0.8">
      <path d="M60 110 Q90 136 120 136"/>
      <path d="M240 110 Q210 136 180 136"/>
    </g>
  </g>

  <!-- ===== Text ===== -->
  <text x="70" y="120" fill="#ffffff" font-size="46" font-weight="700">🤖 Mobile Dual-Arm Manipulator</text>
  <text x="70" y="168" fill="url(#accent)" font-size="30" font-weight="600">Whole-Body Control · QP + Reinforcement Learning</text>
  <text x="70" y="210" fill="#9fb3d1" font-size="20">Coordinated dual-arm motion on a steering-wheel chassis</text>
  <text x="70" y="245" fill="#6f86a8" font-size="16" letter-spacing="2">CONTROL SYSTEM LAB · SEP 2026</text>
</svg>
